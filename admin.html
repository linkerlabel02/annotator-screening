<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>標註篩選 — 管理員結果表</title>
<style>
  :root{ --bg:#f1f5f9; --card:#fff; --ink:#1e293b; --sub:#64748b; --brand:#2563eb;
    --brand-d:#1d4ed8; --line:#e2e8f0; --ok:#059669; --warn:#d97706; --bad:#dc2626; }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.7}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 16px 64px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px}
  h1{font-size:22px;margin:0 0 6px}
  .pill{display:inline-block;font-size:13px;font-weight:700;padding:3px 10px;border-radius:99px;
    background:#eff6ff;color:var(--brand-d);margin-bottom:10px}
  .sub{color:var(--sub);font-size:14px}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--brand);color:#fff;border:none;
    border-radius:10px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer}
  .btn:hover{background:var(--brand-d)}
  .btn.ghost{background:#fff;color:var(--brand);border:1.5px solid var(--brand)}
  input[type=password]{width:100%;max-width:280px;padding:12px 14px;border:1.5px solid var(--line);
    border-radius:10px;font-size:16px;margin-top:8px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .hide{display:none!important}
  table.xls{border-collapse:collapse;width:100%;font-size:14px;background:#fff}
  table.xls th,table.xls td{border:1px solid #cbd5e1;padding:8px 10px;white-space:nowrap;text-align:center}
  table.xls th{background:#e2e8f0;font-weight:800;position:sticky;top:0}
  table.xls td.name{font-weight:700;text-align:left}
  table.xls td.q{text-align:left;white-space:normal;min-width:230px;max-width:340px}
  table.xls tr:nth-child(even) td{background:#f8fafc}
  .v-ok{color:var(--ok);font-weight:800}
  .v-warn{color:var(--warn);font-weight:800}
  .v-bad{color:var(--bad);font-weight:800}
  .lnk{background:none;border:none;color:var(--brand);font-weight:700;cursor:pointer;
    text-decoration:underline;font-size:14px;font-family:inherit;padding:0}
  .lnk.allok{color:var(--ok);text-decoration:none;cursor:default}
  .modal{position:fixed;inset:0;background:rgba(15,23,42,.92);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:20px}
  .detail-box{background:#fff;border-radius:14px;max-width:660px;width:100%;max-height:88vh;overflow:auto;padding:22px}
  .foot{color:var(--sub);font-size:13px;text-align:center;margin-top:22px}
  .note{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;font-size:14px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">

  <!-- 登入 -->
  <section id="s-login" class="card">
    <span class="pill">標註篩選・管理員</span>
    <h1>測驗結果表</h1>
    <p class="sub">請輸入管理員密碼</p>
    <input type="password" id="pw" placeholder="密碼" onkeydown="if(event.key==='Enter')login()">
    <div class="row" style="margin-top:14px"><button class="btn" onclick="login()">登入</button></div>
  </section>

  <!-- 結果面板 -->
  <section id="s-panel" class="card hide">
    <h1>測驗結果表 <span id="count" class="sub" style="font-weight:400"></span></h1>
    <div class="row" style="margin:12px 0 16px">
      <button class="btn" onclick="loadData()">↻ 重新整理</button>
      <button class="btn ghost" onclick="exportCSV()">⬇ 匯出 Excel（CSV）</button>
      <button class="btn ghost" onclick="location.href='index.html'">← 返回測驗</button>
    </div>
    <div id="msg" class="sub"></div>
    <div style="overflow:auto;max-height:68vh"><table id="tbl" class="xls"></table></div>
    <p class="foot">資料來自 Google 試算表。若顯示連線失敗，請確認 <b>GAS_URL</b> 已正確填入、且 Apps Script 已部署為「任何人可存取」。</p>
  </section>

  <div class="foot">© LinkerVision・標註團隊　|　適性篩選・管理員</div>
</div>

<div class="modal hide" id="detail-modal" onclick="if(event.target.id==='detail-modal')closeDetail()">
  <div class="detail-box">
    <div class="row" style="justify-content:space-between;margin-bottom:10px">
      <h1 id="detail-title" style="font-size:18px;margin:0">作答明細</h1>
      <button class="btn ghost" style="padding:6px 14px" onclick="closeDetail()">關閉</button>
    </div>
    <table class="xls" id="detail-table"></table>
  </div>
</div>

<script>
/* ====== 設定：把 Apps Script 部署後的網址貼這裡（跟 index.html 的 gasUrl 同一個） ====== */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxgyzZN2swtTPfR1oE3Y0gR7pIsYvnqj_FZMpLvWgeTn9Tdyp2pO7yA__v593IM-ECg/exec';
const ADMIN_PASSWORD = 'admin1234';

/* ====== 計分設定（與 index.html 一致；改門檻兩邊要一起改） ====== */
const CONFIG = {
  traits: {
    logic:       { label:'邏輯判斷', desc:'看得懂畫面、做出符合常理的判斷', max:5, pass:4 },
    detail:      { label:'細心觀察', desc:'能注意到畫面中的細節',           max:15, pass:12 },
    rule:        { label:'遵循規則', desc:'依指定規則判斷，而非憑直覺',     max:1, pass:1 },
    diligence:   { label:'認真讀題', desc:'會仔細閱讀題目要求',             max:2, pass:2 },
    consistency: { label:'作答一致性', desc:'同一畫面前後判斷一致，非亂猜', max:2, pass:2 },
  },
  criticalTraits: ['logic','diligence'],
};

/* ====== 題目（與 index.html 順序、答案一致；用來算分與顯示「答錯題」） ====== */
const QUESTIONS = [
  { id:'q1',  trait:'logic',       q:'這張街景畫面是白天還是夜晚？', answer:'白天' },
  { id:'q2',  trait:'detail',      q:'有沒有大型施工機具（怪手／挖土機）？', answer:'有' },
  { id:'q3',  trait:'rule',        q:'依規則，這張畫面應標記為？', answer:'施工' },
  { id:'q4',  trait:'detail',      q:'有沒有施工人員（戴安全帽／反光背心）？', answer:'有' },
  { id:'q5',  trait:'logic',       q:'這張街景畫面是白天還是夜晚？', answer:'夜晚' },
  { id:'q6',  trait:'logic',       q:'畫面中是何種交通違規？', answer:'車輛在禁停紅線上' },
  { id:'q7',  trait:'detail',      q:'紅綠燈（號誌）顯示什麼顏色？', answer:'綠燈' },
  { id:'q9',  trait:'diligence',   q:'注意力題：請直接選「否」。', answer:'否' },
  { id:'q10', trait:'detail',      q:'有沒有發生交通事故（車禍）？', answer:'有' },
  { id:'q11', trait:'detail',      q:'是否有紅線？（無紅線選 NA）', answer:'NA' },
  { id:'q12', trait:'detail',      q:'畫面中是否有三角錐？', answer:'否' },
  { id:'q19', trait:'detail',      q:'畫面中是否有消防車？', answer:'否' },
  { id:'q13', trait:'logic',       q:'這個路段的車流狀況是？', answer:'順暢' },
  { id:'q14', trait:'consistency', q:'紅綠燈（號誌）顯示什麼顏色？', answer:'綠燈', consistencyWith:'q7' },
  { id:'q15', trait:'detail',      q:'紅綠燈（號誌）是亮著還是不亮？', answer:'不亮' },
  { id:'q16', trait:'diligence',   q:'注意力題：請直接選「白天」。', answer:'白天' },
  { id:'q17', trait:'detail',      q:'畫面中是否有垃圾？', answer:'是' },
  { id:'q18', trait:'consistency', q:'有沒有發生交通事故（車禍）？', answer:'有', consistencyWith:'q10' },
  { id:'q20', trait:'detail',      q:'路面是否有裂縫？', answer:'是' },
  { id:'q21', trait:'detail',      q:'路面是否有補丁？', answer:'否' },
  { id:'q22', trait:'detail',      q:'畫面中道路標誌是否異常？（模糊、退色、破損都算異常）', answer:'是' },
  { id:'q23', trait:'detail',      q:'道路上是否有坑洞？', answer:'沒有' },
  { id:'q24', trait:'detail',      q:'畫面中停車格是否模糊？', answer:'是' },
  { id:'q25', trait:'detail',      q:'畫面中公車停靠站是否有垃圾？', answer:'沒有' },
  { id:'q26', trait:'logic',       q:'畫面中是否交通壅塞？', answer:'是' },
];
const TRAIT_ORDER = ['logic','detail','rule','diligence','consistency'];

let LIST = [];

const $ = id => document.getElementById(id);
function esc(s){ return String(s==null?'':s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function fmtTime(s){ try{ const d=new Date(s); if(isNaN(d)) return s; return d.toLocaleString('zh-TW',{year:'numeric',month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}); }catch(e){ return s; } }
function fmtDur(s){ if(s==null||s==='') return ''; s=+s; if(isNaN(s)) return ''; const m=Math.floor(s/60),x=s%60; return m+'分'+(x<10?'0':'')+x+'秒'; }

function scoreRow(ans){
  ans = ans || {};
  const t = CONFIG.traits, got = {}; Object.keys(t).forEach(k=>got[k]=0);
  QUESTIONS.forEach(q=>{
    const a = ans[q.id];
    if(q.trait==='consistency'){ if(a===ans[q.consistencyWith]) got.consistency++; }
    else if(a===q.answer) got[q.trait]++;
  });
  const detail={}; let allPass=true, crit=false;
  Object.keys(t).forEach(k=>{
    const pass = got[k]>=t[k].pass;
    detail[k]={label:t[k].label,desc:t[k].desc,got:got[k],max:t[k].max,need:t[k].pass,pass};
    if(!pass) allPass=false;
    if(!pass && CONFIG.criticalTraits.includes(k)) crit=true;
  });
  let verdict,vClass;
  if(crit){verdict='不建議錄取';vClass='bad';}
  else if(allPass){verdict='建議錄取';vClass='ok';}
  else {verdict='需再評估';vClass='warn';}
  return {detail,verdict,vClass};
}
function qDetailRow(ans){
  ans = ans || {};
  return QUESTIONS.map((q,i)=>{
    let correct,ok;
    if(q.trait==='consistency'){ correct=ans[q.consistencyWith]; ok=(ans[q.id]===correct); }
    else { correct=q.answer; ok=(ans[q.id]===correct); }
    return {n:i+1, text:q.q, ua:ans[q.id], correct:correct, ok:ok};
  });
}

function login(){
  if($('pw').value === ADMIN_PASSWORD){
    $('s-login').classList.add('hide');
    $('s-panel').classList.remove('hide');
    loadData();
  } else alert('密碼錯誤');
}

async function loadData(){
  $('msg').textContent = '讀取中…';
  if(!GAS_URL){ $('msg').innerHTML = '<span class="v-bad">尚未設定 GAS_URL。</span> 請把 Apps Script 部署後的網址填到本檔最上方的 GAS_URL。'; renderTable(); return; }
  try{
    const resp = await fetch(GAS_URL, {method:'GET', redirect:'follow'});
    const json = await resp.json();
    LIST = (json.status==='ok') ? (json.data||[]) : [];
    $('msg').textContent = '';
    renderTable();
  }catch(err){
    $('msg').innerHTML = '<span class="v-bad">連線失敗：</span>' + esc(String(err)) + '（請確認 GAS_URL 正確、且部署為「任何人可存取」）';
  }
}

function renderTable(){
  const t = CONFIG.traits;
  $('count').textContent = '（共 ' + LIST.length + ' 筆）';
  let head = '<tr><th>#</th><th>時間</th><th>測驗時長</th><th>姓名</th><th>Email</th><th>總判定</th><th>答題正確數</th>';
  TRAIT_ORDER.forEach(k=> head += '<th>'+t[k].label+'</th>');
  head += '<th>答錯題（點看明細）</th></tr>';
  let body = '';
  if(!LIST.length){
    body = '<tr><td colspan="13" style="padding:24px;color:var(--sub)">尚無資料</td></tr>';
  }
  LIST.slice().reverse().forEach((row,i)=>{
    const realIdx = LIST.length-1-i;
    const r = scoreRow(row.answers);
    const vc = {ok:'v-ok',warn:'v-warn',bad:'v-bad'}[r.vClass]||'';
    body += '<tr><td>'+(LIST.length-i)+'</td><td>'+esc(fmtTime(row.timestamp))+'</td>'+
            '<td>'+esc(fmtDur(row.durationSec))+'</td>'+
            '<td class="name">'+esc(row.name)+'</td><td>'+esc(row.email)+'</td>'+
            '<td class="'+vc+'">'+esc(r.verdict)+'</td>';
    const allDetail = qDetailRow(row.answers);
    const correct = allDetail.filter(d=>d.ok).length;
    const total = allDetail.length;
    body += '<td><b>'+correct+'/'+total+'</b></td>';
    TRAIT_ORDER.forEach(k=>{
      const d = r.detail[k]; const c = d.pass?'v-ok':'v-bad';
      body += '<td class="'+c+'">'+d.got+'/'+d.max+'</td>';
    });
    const wrong = allDetail.filter(d=>!d.ok);
    if(!wrong.length) body += '<td><span class="lnk allok">全對</span></td>';
    else body += '<td><button class="lnk" onclick="openDetail('+realIdx+')">'+wrong.map(d=>'Q'+d.n).join('、')+'</button></td>';
    body += '</tr>';
  });
  $('tbl').innerHTML = head + body;
}

function openDetail(idx){
  const row = LIST[idx]; if(!row) return;
  $('detail-title').textContent = '作答明細 — ' + (row.name||'');
  let h = '<tr><th>題</th><th>題目</th><th>他選的</th><th>正解</th><th>判定</th></tr>';
  qDetailRow(row.answers).forEach(d=>{
    const c = d.ok?'v-ok':'v-bad';
    h += '<tr><td>Q'+d.n+'</td><td class="q">'+esc(d.text)+'</td>'+
         '<td class="'+c+'">'+esc(d.ua==null?'(未答)':d.ua)+'</td>'+
         '<td>'+esc(d.correct==null?'—':d.correct)+'</td>'+
         '<td class="'+c+'">'+(d.ok?'✓':'✗')+'</td></tr>';
  });
  $('detail-table').innerHTML = h;
  $('detail-modal').classList.remove('hide');
}
function closeDetail(){ $('detail-modal').classList.add('hide'); }

function exportCSV(){
  const t = CONFIG.traits;
  const cols = ['時間','測驗時長','姓名','Email','總判定'];
  TRAIT_ORDER.forEach(k=> cols.push(t[k].label));
  cols.push('答錯題');
  const rows = [cols];
  LIST.forEach(row=>{
    const r = scoreRow(row.answers);
    const a = [row.timestamp, fmtDur(row.durationSec), row.name, row.email||'', r.verdict];
    TRAIT_ORDER.forEach(k=>{ const d=r.detail[k]; a.push(d.got+'/'+d.max+(d.pass?' 通過':' 未達標')); });
    const wrong = qDetailRow(row.answers).filter(d=>!d.ok).map(d=>'Q'+d.n).join('、');
    a.push(wrong||'全對');
    rows.push(a);
  });
  const csv = '﻿' + rows.map(r=> r.map(c=> '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '標註篩選結果_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetail(); });
</script>
</body>
</html>
